<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password | StudySphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body
    class="bg-gray-50 flex flex-col items-center justify-center min-h-screen"
  >
    <div
      class="w-full max-w-md bg-white border border-gray-100 rounded-2xl shadow-sm p-8"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Set New Password</h1>
        <p class="text-sm text-gray-500">
          Please enter your new secure password below.
        </p>
      </div>

      <form id="new-password-form">
        <div class="mb-4">
          <label for="password" class="form-label">New Password</label>
          <input
            type="password"
            id="password"
            required
            minlength="8"
            class="form-input"
          />
        </div>

        <div class="mb-6">
          <label for="confirm-password" class="form-label"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirm-password"
            required
            minlength="8"
            class="form-input"
          />
        </div>

        <button
          id="submit-btn"
          type="submit"
          class="btn-primary w-full justify-center py-3"
        >
          Update Password
        </button>
      </form>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"
    ></div>

    <script>
      // Pass the token from Flask to JS
      const resetToken = "{{ token }}";
    </script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth/reset-password.js') }}"></script>
  </body>
</html>
