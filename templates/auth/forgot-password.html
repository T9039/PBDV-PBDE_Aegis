<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | StudySphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body
    class="bg-gray-50 flex flex-col items-center justify-center min-h-screen"
  >
    <div
      class="w-full max-w-md bg-white border border-gray-100 rounded-2xl shadow-sm p-8"
    >
      <div class="text-center mb-8">
        <div
          class="w-12 h-12 rounded-xl flex items-center justify-center bg-blue-50 mx-auto mb-4"
        >
          <svg
            class="w-6 h-6 text-blue-800"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Reset Password</h1>
        <p class="text-sm text-gray-500">
          Enter your campus email to receive a secure reset link.
        </p>
      </div>

      <form id="forgot-password-form">
        <div class="mb-5">
          <label for="email" class="form-label">Student Email or Number</label>
          <input
            type="email"
            id="email"
            required
            placeholder="e.g. 22012345@student.dut.ac.za"
            class="form-input"
          />
        </div>

        <button
          id="reset-btn"
          type="submit"
          class="btn-primary w-full justify-center py-3"
        >
          Send Reset Link
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        Remember your password?
        <a
          href="/login"
          class="text-blue-700 hover:underline font-semibold transition"
          >Back to Sign In</a
        >
      </p>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"
    ></div>

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth/forgot-password.js') }}"></script>
  </body>
</html>
