<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Aegis</title>
    <link href="/static/css/output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden"
  >
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-900/10 blur-[100px] rounded-full pointer-events-none z-0"
    ></div>

    <div class="relative z-10 mb-8 flex items-center gap-3">
      <div
        class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-emerald-900/20"
      >
        A
      </div>
      <span class="text-3xl font-bold text-white tracking-wide">Aegis</span>
    </div>

    <div
      class="relative z-10 w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl p-8"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-white mb-2">Welcome</h1>
        <p class="text-sm text-slate-400">
          Enter your campus credentials to sign in
        </p>
      </div>

      <div
        id="auth-alert"
        class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-red-400 bg-red-900/30 border border-red-800/50 text-center transition-all"
      ></div>

      <form id="login-form" action="#" method="POST" class="space-y-5">
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-slate-300 mb-2"
            >Student Email or Number</label
          >
          <input
            type="text"
            id="email"
            name="email"
            placeholder="e.g. 22012345@student.campus.ac.za"
            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-slate-300 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
          />
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label
              for="password"
              class="block text-sm font-medium text-slate-300"
              >Password</label
            >
            <a
              href="/forgot-password"
              class="text-xs text-emerald-500 hover:text-emerald-400 transition font-medium"
              >Forgot password?</a
            >
          </div>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-slate-300 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
          />
        </div>

        <label
          for="remember-me"
          class="flex items-center gap-3 cursor-pointer group mt-2 mb-6 w-max"
        >
          <div class="relative flex items-center justify-center">
            <input type="checkbox" id="remember-me" class="peer sr-only" />

            <div
              class="w-5 h-5 rounded-[4px] border border-slate-700 bg-slate-950 shadow-inner peer-checked:bg-emerald-600 peer-checked:border-emerald-500 peer-focus-visible:ring-2 peer-focus-visible:ring-emerald-500/50 peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-slate-900 transition-all duration-200 group-hover:border-slate-500"
            ></div>

            <svg
              class="absolute w-3.5 h-3.5 text-white opacity-0 scale-50 peer-checked:opacity-100 peer-checked:scale-100 transition-all duration-200 pointer-events-none"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <span
            class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors select-none"
          >
            Remember this device for 30 days
          </span>
        </label>

        <button
          id="submit-btn"
          type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg transition shadow-lg shadow-emerald-900/20 mt-2"
        >
          Sign In
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-8">
        <a
          href="/forgot-password"
          class="text-emerald-500 hover:text-emerald-400 font-medium transition"
          >Forgot password</a
        >
      </p>
    </div>

    <div class="relative z-10 mt-12 text-xs text-slate-600">
      &copy; 2026 Aegis Peer Support Platform.
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
