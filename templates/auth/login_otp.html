<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Identity | Aegis</title>
    <link href="/static/css/output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-slate-950 text-slate-300 font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden"
  >
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-900/10 blur-[100px] rounded-full pointer-events-none z-0"
    ></div>

    <div
      class="relative z-10 w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl p-8 text-center"
    >
      <div
        class="w-12 h-12 bg-emerald-900/30 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-800/50"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
          />
        </svg>
      </div>

      <h1 class="text-2xl font-bold text-white mb-2">Check your email</h1>
      <p class="text-sm text-slate-400 mb-8">
        We've sent a 6-digit verification code to your @dut4life.ac.za address.
      </p>

      <div
        id="otp-alert"
        class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-red-400 bg-red-900/30 border border-red-800/50 text-center transition-all"
      ></div>

      <form id="otp-form" action="#" method="POST" class="space-y-6">
        <div>
          <input
            type="text"
            id="otp-code"
            name="otp-code"
            maxlength="6"
            placeholder="000000"
            autocomplete="off"
            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-4 text-center text-3xl tracking-[1em] font-mono text-slate-200 placeholder-slate-700 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
          />
        </div>

        <button
          id="verify-btn"
          type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg transition shadow-lg shadow-emerald-900/20"
        >
          Verify Code
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-6">
        Didn't receive a code?
        <button
          id="resend-btn"
          class="text-emerald-500 hover:text-emerald-400 font-medium transition"
        >
          Resend
        </button>
      </p>
    </div>

    <script src="{{ url_for('static', filename='js/login_otp.js') }}"></script>
  </body>
</html>
