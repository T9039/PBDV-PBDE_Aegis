<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Mentors | Aegis</title>
    <link href="../static/css/output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-slate-950 text-slate-300 font-sans min-h-screen relative overflow-x-hidden"
  >
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-emerald-900/20 blur-[120px] rounded-full pointer-events-none z-0"
    ></div>

    <div class="pt-6 px-6 relative z-50 max-w-6xl mx-auto">
      <nav
        class="flex items-center justify-between px-6 py-3 bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-full shadow-lg"
      >
        <div class="flex items-center gap-2">
          <div
            class="w-7 h-7 bg-emerald-600 rounded flex items-center justify-center text-white font-bold text-sm"
          >
            A
          </div>
          <span class="text-lg font-bold text-white tracking-wide">Aegis</span>
        </div>

        <div class="hidden md:flex items-center gap-8">
          <a href="#" class="text-sm text-slate-300 hover:text-white transition"
            >Home</a
          >
          <a href="#" class="text-sm text-slate-300 hover:text-white transition"
            >Features</a
          >
          <a href="#" class="text-sm text-slate-300 hover:text-white transition"
            >Resources</a
          >
        </div>

        <div class="flex items-center gap-4">
          <a
            href="#"
            class="text-sm font-medium hover:text-white transition hidden sm:block"
            >Login</a
          >
          <a
            href="#"
            class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-full text-sm font-semibold transition"
            >Get Started</a
          >
        </div>
      </nav>
    </div>

    <main class="relative z-10 max-w-4xl mx-auto mt-20 px-6 text-center">
      <div
        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-slate-700 bg-slate-900/50 text-slate-300 text-sm mb-8 shadow-sm"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="w-4 h-4 text-emerald-500"
        >
          <path
            fill-rule="evenodd"
            d="M10 2.5c-1.31 0-2.526.386-3.546 1.051a.75.75 0 01-.82-1.256A8 8 0 0118 9a22.47 22.47 0 01-1.228 7.351.75.75 0 11-1.417-.49A20.97 20.97 0 0016.5 9 6.5 6.5 0 0010 2.5zM4.333 6.951a.75.75 0 01.298 1.019 6.15 6.15 0 00-.96 4.711.75.75 0 11-1.458.355 7.65 7.65 0 011.101-5.787.75.75 0 011.019-.298zM3.864 16.452a.75.75 0 011.022-.271 20.984 20.984 0 003.586 1.761.75.75 0 11-.476 1.423 22.484 22.484 0 01-3.861-1.89.75.75 0 01-.271-1.023z"
            clip-rule="evenodd"
          />
        </svg>
        Manage your campus tutoring sessions easily
      </div>

      <h1
        class="text-5xl md:text-6xl font-bold text-white mb-6 leading-tight tracking-tight"
      >
        The all-in-one platform <br class="hidden md:block" />
        for peer mentors
      </h1>

      <p
        class="text-lg md:text-xl text-slate-400 mb-10 max-w-2xl mx-auto leading-relaxed"
      >
        Manage your scheduling, student requests, and session notes in one
        place. Built specifically to help you guide your peers without the
        administrative headache.
      </p>

      <div class="flex flex-col sm:flex-row justify-center gap-4">
        <button
          class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3.5 rounded-full font-semibold transition text-lg shadow-lg shadow-emerald-900/20"
        >
          Become a Mentor
        </button>
        <button
          class="bg-slate-900 border border-slate-700 hover:bg-slate-800 text-white px-8 py-3.5 rounded-full font-semibold transition text-lg"
        >
          See Aegis in Action
        </button>
      </div>
    </main>

    <section class="relative z-10 max-w-5xl mx-auto mt-20 mb-24 px-6">
      <div
        class="p-2 rounded-3xl bg-gradient-to-b from-slate-800 to-slate-950 shadow-2xl"
      >
        <div
          class="bg-slate-950 rounded-2xl border border-slate-800 overflow-hidden aspect-[16/9] flex flex-col"
        >
          <div
            class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center gap-2"
          >
            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
          </div>

          <div
            class="p-8 flex gap-8 h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950"
          >
            <div class="w-48 hidden md:flex flex-col gap-4">
              <div class="h-8 bg-slate-800 rounded w-full mb-4"></div>
              <div class="h-4 bg-slate-800/50 rounded w-3/4"></div>
              <div class="h-4 bg-slate-800/50 rounded w-5/6"></div>
              <div class="h-4 bg-slate-800/50 rounded w-2/3"></div>
            </div>

            <div class="flex-grow flex flex-col gap-6">
              <div class="h-10 bg-slate-800 rounded w-1/3"></div>
              <div class="flex gap-4">
                <div
                  class="flex-1 h-32 bg-slate-800/30 border border-slate-700/50 rounded-xl"
                ></div>
                <div
                  class="flex-1 h-32 bg-slate-800/30 border border-slate-700/50 rounded-xl"
                ></div>
                <div
                  class="flex-1 h-32 bg-slate-800/30 border border-slate-700/50 rounded-xl"
                ></div>
              </div>
              <div
                class="flex-grow bg-slate-800/20 border border-slate-700/50 rounded-xl"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
