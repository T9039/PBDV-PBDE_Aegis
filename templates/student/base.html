<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Find a Mentor | Aegis{% endblock %}</title>
    <link
      href="{{ url_for('static', filename='css/output.css') }}"
      rel="stylesheet"
    />
  </head>
  <body class="bg-slate-950 text-slate-300 font-sans min-h-screen">
    <nav
      class="flex items-center justify-between px-6 py-4 border-b border-slate-800"
    >
      <div class="flex items-center gap-2">
        <div
          class="w-8 h-8 bg-emerald-600 rounded-md flex items-center justify-center text-white font-bold"
        >
          A
        </div>
        <span class="text-xl font-bold text-white tracking-wide">Aegis</span>
      </div>

      <div class="hidden md:flex items-center gap-6">
        <a href="#" class="text-sm hover:text-white transition"
          >For Departments</a
        >
        <a
          href="#"
          class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-full text-sm font-semibold transition"
          >Browse all mentors</a
        >
        <a
          href="/logout"
          title="Sign Out"
          class="flex items-center justify-center p-2.5 rounded-full border border-transparent text-slate-400 hover:text-emerald-400 hover:border-emerald-500/50 hover:bg-slate-800 transition-all group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="group-hover:translate-x-0.5 transition-transform duration-200"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </a>
      </div>
    </nav>

    {% block content %} {% endblock %}

    <div
      id="toast-container"
      class="fixed top-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"
    ></div>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>

    {% block scripts %} {% endblock %}
  </body>
</html>
